# Builds the Vite project and deploys it to GitHub Pages on every push
# to main. The live preview is served at:
#   https://sassydezz.github.io/LivingCityEngine/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual re-deploys from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; keep the newest queued one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (strict typecheck + production bundle)
        run: npm run build
        env:
          # The site lives under /LivingCityEngine/ on github.io, so
          # asset URLs must be prefixed accordingly (see vite.config.ts).
          VITE_BASE_PATH: /LivingCityEngine/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (source: GitHub Actions) on first run.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
